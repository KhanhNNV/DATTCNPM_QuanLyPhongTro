server.port=8080

# ===============================
# MYSQL
# ===============================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/QuanLyPhongTro?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true}

spring.datasource.username=${DB_USERNAME:root}

spring.datasource.password=${DB_PASSWORD:151205}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.jpa.open-in-view=false

spring.jpa.auditing.enabled=true

# ===============================
# REDIS
# ===============================
app.redis.enabled=true

spring.data.redis.host=${REDIS_HOST:localhost}

spring.data.redis.port=${REDIS_PORT:6379}

# ===============================
# JWT
# ===============================
app.jwt.secretKey=${JWT_SECRET:DayLaJWTSecretKeyChoMoiTruongLocalRatDaiVaBaoMat123456789}

# ===============================
# LOGGING
# ===============================
logging.level.org.springframework.security=DEBUG